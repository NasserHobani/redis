version: '3.8'

services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    command: redis-server --appendonly yes

  redis_insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis
    volumes:
      - ./redis_insight_data:/db

  rq_worker:
    build: ./worker
    command: rq worker rag_queue
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379